services:
  postgres:
    image: postgres:16-alpine
    container_name: baseline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: baseline
      POSTGRES_PASSWORD: baseline
      POSTGRES_DB: baseline
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseline"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baseline

  redis:
    image: redis:7-alpine
    container_name: baseline-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - baseline

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: baseline-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://baseline:baseline@postgres:5432/baseline
      - AUTH_SECRET=${AUTH_SECRET:-change-me}
      # AUTH_URL intentionally unset: with AUTH_TRUST_HOST, Auth.js derives the
      # origin from the request, so there is no per-environment URL to hardcode.
      - AUTH_TRUST_HOST=true
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # Leave unset to auto-detect the public origin. Set it only to pin one — it
      # then wins and must match the OAuth App's registered callback URL.
      - WEB_URL=${WEB_URL:-}
    networks:
      - baseline

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: baseline-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      # No NEXT_PUBLIC_API_URL: the browser calls the web origin and Next.js
      # rewrites proxy /api/auth/* and /v1/* to the API over the docker network.
      - API_INTERNAL_URL=http://api:3001
      - AUTH_SECRET=${AUTH_SECRET:-change-me}
    ports:
      - "3002:3002"
    networks:
      - baseline

  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
      args:
        NEXT_PUBLIC_GITHUB_USERNAME: ${GITHUB_USERNAME:-}
    container_name: baseline-marketing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GITHUB_USERNAME=${GITHUB_USERNAME:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-}
    ports:
      - "3000:3000"
    networks:
      - baseline

volumes:
  postgres-data:
  redis-data:

networks:
  baseline:
    driver: bridge
