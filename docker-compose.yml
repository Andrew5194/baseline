# Baseline — self-host stack. Runs the images published to Docker Hub (no build step):
#
#       cp .env.example .env      # then set AUTH_SECRET + GitHub OAuth
#       docker compose pull       # fetch the published images
#       docker compose up -d      # then open http://localhost:3002
#
# Runs :latest by default — edit the image tags below to pin a release (e.g. :v0.0.2).
# To develop against source, use `make dev` (host apps + this postgres); the images
# themselves are built and validated in CI, not here.

services:
  postgres:
    image: postgres:16-alpine
    container_name: baseline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baseline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baseline}
      POSTGRES_DB: ${POSTGRES_DB:-baseline}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baseline}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baseline

  api:
    image: andrew5194/baseline-api:latest
    container_name: baseline-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-baseline}:${POSTGRES_PASSWORD:-baseline}@postgres:5432/${POSTGRES_DB:-baseline}
      - AUTH_SECRET=${AUTH_SECRET:?set AUTH_SECRET in .env — generate one with openssl rand -base64 32}
      # AUTH_URL intentionally unset: with AUTH_TRUST_HOST, Auth.js derives the
      # origin from the request, so there is no per-environment URL to hardcode.
      - AUTH_TRUST_HOST=true
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # Leave unset to auto-detect the public origin. Set it only to pin one — it
      # then wins and must match the OAuth App's registered callback URL.
      - WEB_URL=${WEB_URL:-}
    networks:
      - baseline

  web:
    image: andrew5194/baseline-web:latest
    container_name: baseline-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      # No NEXT_PUBLIC_API_URL: the browser calls the web origin and Next.js
      # rewrites proxy /api/auth/* and /v1/* to the API over the docker network.
      - API_INTERNAL_URL=http://api:3001
      - AUTH_SECRET=${AUTH_SECRET:?set AUTH_SECRET in .env — generate one with openssl rand -base64 32}
    ports:
      - "${WEB_PORT:-3002}:3002"
    networks:
      - baseline

volumes:
  postgres-data:

networks:
  baseline:
    driver: bridge
